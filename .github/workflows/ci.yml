name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  python:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.14"
          enable-cache: false
      - run: uv sync --no-install-project
      - run: uv run --no-sync ruff format --check .
      - run: uv run --no-sync ruff check .

  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.14"
          enable-cache: false
      - run: uv sync --no-install-project
      - run: cargo test
      - run: uv run --no-sync maturin develop
      - run: uv run --no-sync pytest -v --cov=polars_polyline --cov-report=term-missing
