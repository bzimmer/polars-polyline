name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  macos:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.14"
          enable-cache: false
      - uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos
          path: dist

  linux-x86_64:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: auto
          args: --release --out dist --interpreter python3.14
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: dist

  linux-aarch64:
    name: Linux (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: auto
          args: --release --out dist --interpreter python3.14
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-aarch64
          path: dist

  windows-x86_64:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --interpreter python3.14
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x86_64
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [sdist, macos, linux-x86_64, linux-aarch64, windows-x86_64]
    environment:
      name: pypi
      url: https://pypi.org/p/polars-polyline
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
      - run: uv publish dist/*
